<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <title>Number Guessing Game.vol</title>
  </head>
  <body>
    <div class="container">
      <h2>I am thinking of a number between 1 and 100.</h2>
      <h3>Can you guess what it is...?</h3>

      <input type="text" id="guessInput" placeholder="Enter your guess here"><br>
      <button  onclick="play()" type="button" id="my_btn" >Submit Guess </button>

      <p class="message1" id="message1">Number of guesses: 0</p>
      <p class="message2" id="message2">Guessed Number of Attempts: none</p>
      <p class="message3" id="message3"></p>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
